<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>茶叶 AI 工具导航</title>
  <style>
    :root {
      --bg: #f4f6f3;
      --panel: #ffffff;
      --ink: #15231c;
      --muted: #65736b;
      --line: #dbe2dc;
      --green: #2f6b4f;
      --green-soft: #e7f0ea;
      --dark: #0f1d17;
      --white: #ffffff;
      --shadow: 0 18px 48px rgba(15, 29, 23, 0.10);
    }

    * { box-sizing: border-box; }

    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      letter-spacing: 0;
      background: linear-gradient(180deg, #f7f8f6 0%, #eef3ef 100%);
    }

    button, a { font: inherit; }
    a { color: inherit; text-decoration: none; }

    .page {
      height: 100dvh;
      display: grid;
      grid-template-rows: 1fr;
      overflow: hidden;
    }

    main {
      width: min(1240px, calc(100% - 32px));
      height: 100dvh;
      margin: 0 auto;
      padding: 16px 0;
      overflow: hidden;
    }

    .tool-shell {
      display: grid;
      grid-template-columns: 332px minmax(0, 1fr);
      gap: 20px;
      align-items: stretch;
      height: 100%;
      min-height: 0;
    }

    .tool-nav {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 14px;
      min-height: 0;
      overflow: auto;
    }

    .nav-section + .nav-section {
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
    }

    .nav-title {
      margin: 0 0 10px;
      color: var(--green);
      font-size: 13px;
      font-weight: 850;
    }

    .tool-button {
      width: 100%;
      border: 1px solid transparent;
      background: transparent;
      text-align: left;
      color: var(--ink);
      border-radius: 8px;
      padding: 12px 13px;
      cursor: pointer;
      display: grid;
      gap: 5px;
    }

    .tool-button + .tool-button { margin-top: 6px; }

    .tool-button strong {
      font-size: 16px;
      line-height: 1.2;
    }

    .tool-button span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .tool-button.active {
      border-color: rgba(47, 107, 79, 0.28);
      background: var(--green-soft);
    }

    .detail-panel {
      position: relative;
      overflow: hidden;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: clamp(22px, 4vw, 34px);
      min-height: 0;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    .detail-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 18px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--line);
    }

    .detail-title h3 {
      margin: 0;
      font-size: clamp(30px, 4vw, 46px);
      line-height: 1.1;
    }

    .detail-title p {
      margin: 10px 0 0;
      color: var(--muted);
      line-height: 1.65;
      font-size: 16px;
      max-width: 720px;
    }

    .badge {
      color: white;
      background: var(--green);
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .detail-body {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(250px, 0.75fr);
      gap: 22px;
      padding: 24px 0;
      min-height: 0;
      overflow: auto;
    }

    .info-block {
      background: #f8faf8;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
    }

    .info-block h4 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .info-block p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
      font-size: 15px;
    }

    .info-list {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .info-list li {
      display: grid;
      grid-template-columns: 24px 1fr;
      gap: 10px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }

    .info-list b {
      width: 24px;
      height: 24px;
      display: grid;
      place-items: center;
      background: var(--green);
      color: white;
      border-radius: 4px;
      font-size: 12px;
    }

    .detail-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      border-top: 1px solid var(--line);
      padding-top: 20px;
    }

    .open-link {
      min-height: 46px;
      padding: 12px 18px;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 850;
      border: 1px solid var(--dark);
    }

    .open-link {
      background: var(--dark);
      color: white;
    }

    @media (max-width: 1024px) {
      .tool-shell {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(160px, 26vh) minmax(0, 1fr);
      }

      .detail-body {
        grid-template-columns: 1fr;
      }

      .tool-nav {
        display: flex;
        gap: 14px;
        overflow-x: auto;
        overflow-y: hidden;
        padding: 12px;
      }

      .nav-section {
        min-width: 260px;
      }

      .nav-section + .nav-section {
        margin-top: 0;
        padding-top: 0;
        border-top: 0;
      }
    }

    @media (max-width: 640px) {
      main {
        width: calc(100% - 28px);
        padding: 12px 0;
      }

      .detail-panel {
        padding: 18px;
      }

      .tool-shell {
        gap: 12px;
        grid-template-rows: minmax(190px, 34vh) minmax(0, 1fr);
      }

      .detail-top {
        flex-direction: column;
      }

      .detail-title h3 {
        font-size: 30px;
      }

      .tool-nav {
        display: block;
        overflow-y: auto;
        overflow-x: hidden;
        margin-left: 0;
        margin-right: 0;
      }

      .nav-section {
        min-width: 0;
      }

      .nav-section + .nav-section {
        margin-top: 14px;
        padding-top: 14px;
        border-top: 1px solid var(--line);
      }

      .tool-button {
        padding: 11px 12px;
      }

      .tool-button strong {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <main>
      <section class="tool-shell" aria-label="AI 工具导航">
        <nav class="tool-nav" id="toolNav" aria-label="工具列表"></nav>

        <article class="detail-panel" aria-live="polite">
          <div class="detail-top">
            <div class="detail-title">
              <h3 id="detailName"></h3>
              <p id="detailSummary"></p>
            </div>
            <span class="badge" id="detailCategory"></span>
          </div>

          <div class="detail-body">
            <div class="info-block">
              <h4>主要功能</h4>
              <ul class="info-list" id="detailFeatures"></ul>
            </div>
            <div class="info-block">
              <h4>适合场景</h4>
              <p id="detailUseCase"></p>
            </div>
          </div>

          <div class="detail-actions">
            <a class="open-link" id="detailLink" href="#">打开工具</a>
          </div>
        </article>
      </section>
    </main>
  </div>

  <script>
    const tools = [
      {
        id: "prompt",
        group: "本地工具",
        name: "茶叶文生图提示词生成器",
        tag: "已上线",
        href: "./prompt-generator.html",
        summary: "项目内置工具，用来生成茶叶主题文生图和图生图提示词。支持发布平台、内容类型、自定义茶叶品类、指定文案、参考图改图、PK对比结构、构图、画面结构、材质、光影、色彩、氛围和负面词的独立控制；上传图片改图时会保留原图风格。",
        useCase: "适合先搭建茶叶商业海报、知识图鉴、产品摄影、礼盒包装、茶空间、水墨意境等画面的完整提示词，再复制到其它 AI 工具中使用。",
        features: ["文生图 / 图生图模式", "上传图保留原风格", "所有选项可不指定", "PK图对比结构"]
      },
      {
        id: "chatgpt",
        group: "AI 对话工具",
        name: "ChatGPT",
        tag: "对话",
        href: "https://chatgpt.com/",
        summary: "通用 AI 对话工具，适合润色提示词、拆解画面逻辑、扩写商业海报方案和整理茶文化内容。",
        useCase: "适合把生成器输出的提示词继续改写成多版本，或者要求它按品牌调性、平台风格、镜头语言继续优化。",
        features: ["提示词润色", "多版本创意扩写", "中英文转换", "结构化分析"]
      },
      {
        id: "gemini",
        group: "AI 对话工具",
        name: "Gemini",
        tag: "对话",
        href: "https://gemini.google.com/app",
        summary: "Google 的 AI 对话工具，适合做多版本创意扩展、英文提示词转换和跨语言内容整理。",
        useCase: "适合需要英文提示词、跨语言风格描述，或想把茶叶视觉创意扩展成更广泛的品牌内容时使用。",
        features: ["英文提示词转换", "创意发散", "长内容整理", "跨语言表达"]
      },
      {
        id: "doubao",
        group: "AI 对话工具",
        name: "豆包",
        tag: "对话",
        href: "https://www.doubao.com/chat/",
        summary: "中文语境友好的 AI 对话工具，适合茶文化文案、风格描述、短视频脚本和内容改写。",
        useCase: "适合把茶叶提示词改成更自然的中文表达，也适合做小红书、抖音、品牌物料的文案延展。",
        features: ["中文文案改写", "茶文化表达", "短视频脚本", "内容标题生成"]
      },
      {
        id: "claude",
        group: "AI 对话工具",
        name: "Claude",
        tag: "对话",
        href: "https://claude.ai/",
        summary: "适合长文本整理、品牌调性梳理和复杂提示词结构优化的 AI 对话工具。",
        useCase: "适合处理较长的茶叶品牌资料、产品说明、风格规范，并把它们转成更稳定的视觉提示词。",
        features: ["长文档整理", "品牌调性梳理", "复杂结构优化", "内容审校"]
      },
      {
        id: "kimi",
        group: "AI 对话工具",
        name: "Kimi",
        tag: "对话",
        href: "https://www.kimi.com/",
        summary: "适合中文资料整理、长文本阅读和茶叶知识内容梳理的 AI 工具。",
        useCase: "适合整理茶叶百科、产地资料、制茶工艺和产品卖点，再反向补充到提示词生成器中。",
        features: ["中文资料阅读", "知识梳理", "长文本总结", "内容提炼"]
      },
      {
        id: "deepseek",
        group: "AI 对话工具",
        name: "DeepSeek",
        tag: "对话",
        href: "https://chat.deepseek.com/",
        summary: "适合结构化分析、提示词逻辑检查和批量生成变体的 AI 对话工具。",
        useCase: "适合检查提示词是否存在茶类冲突、元素堆叠、风格不一致等问题，也适合批量生成不同版本。",
        features: ["结构检查", "批量变体", "逻辑修正", "提示词诊断"]
      },
      {
        id: "jimeng",
        group: "AI 图像工具",
        name: "即梦 AI",
        tag: "图像",
        href: "https://www.jimeng.com/",
        summary: "中文提示词友好的图像与视频创作工具，适合国风、新中式、商业海报和短视频视觉探索。",
        useCase: "适合直接粘贴中文茶叶提示词，测试商业 KV、茶空间、节气插画、礼盒海报等视觉方向。",
        features: ["中文文生图", "国风视觉", "商业海报", "视频视觉探索"]
      },
      {
        id: "midjourney",
        group: "AI 图像工具",
        name: "Midjourney",
        tag: "图像",
        href: "https://www.midjourney.com/",
        summary: "适合高审美视觉探索、风格化海报和概念艺术方向的 AI 图像工具。",
        useCase: "适合做茶叶微缩景观、东方意境海报、品牌概念视觉等高风格化方向。",
        features: ["高审美探索", "风格化海报", "概念艺术", "视觉方向试验"]
      },
      {
        id: "liblib",
        group: "AI 图像工具",
        name: "LiblibAI",
        tag: "图像",
        href: "https://www.liblib.art/",
        summary: "适合模型风格实验、中文 AIGC 图片工作流和电商视觉尝试的图像平台。",
        useCase: "适合尝试不同模型和风格，做茶叶电商主图、包装视觉、产品摄影感画面。",
        features: ["模型风格实验", "中文 AIGC", "电商视觉", "图片工作流"]
      }
    ];

    const groupedTools = tools.reduce((groups, tool) => {
      groups[tool.group] ||= [];
      groups[tool.group].push(tool);
      return groups;
    }, {});

    const nav = document.getElementById("toolNav");
    const detailName = document.getElementById("detailName");
    const detailSummary = document.getElementById("detailSummary");
    const detailCategory = document.getElementById("detailCategory");
    const detailFeatures = document.getElementById("detailFeatures");
    const detailUseCase = document.getElementById("detailUseCase");
    const detailLink = document.getElementById("detailLink");

    function renderNav() {
      nav.innerHTML = Object.entries(groupedTools).map(([group, items]) => {
        const buttons = items.map((tool) => `
          <button class="tool-button" type="button" data-tool="${tool.id}">
            <strong>${tool.name}</strong>
            <span>${tool.tag} · ${tool.summary}</span>
          </button>
        `).join("");
        return `<section class="nav-section"><h2 class="nav-title">${group}</h2>${buttons}</section>`;
      }).join("");
    }

    function selectTool(id) {
      const tool = tools.find((item) => item.id === id) || tools[0];
      detailName.textContent = tool.name;
      detailSummary.textContent = tool.summary;
      detailCategory.textContent = tool.tag;
      detailUseCase.textContent = tool.useCase;
      detailLink.href = tool.href;
      detailLink.textContent = `打开 ${tool.name}`;
      detailLink.target = tool.href.startsWith("http") ? "_blank" : "_self";
      detailLink.rel = tool.href.startsWith("http") ? "noreferrer" : "";
      detailFeatures.innerHTML = tool.features.map((feature, index) => `
        <li><b>${index + 1}</b><span>${feature}</span></li>
      `).join("");
      document.querySelectorAll(".tool-button").forEach((button) => {
        button.classList.toggle("active", button.dataset.tool === tool.id);
      });
    }

    renderNav();
    nav.addEventListener("click", (event) => {
      const button = event.target.closest(".tool-button");
      if (!button) return;
      selectTool(button.dataset.tool);
    });
    selectTool("prompt");
  </script>
</body>
</html>
